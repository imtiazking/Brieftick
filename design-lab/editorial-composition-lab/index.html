<!DOCTYPE html>
<html lang="en" data-ecl-variant="g">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Concept 35 — Editorial Composition Lab · Design Lab · FORGENIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design-lab/editorial-composition-lab/editorial-composition-lab.css">
</head>
<body>
  <div class="ecl-shell">
    <header class="ecl-chrome">
      <div class="ecl-chrome__start">
        <strong>Design Lab · Concept 35 — Editorial Composition Lab</strong>
        <span class="ecl-chrome__note">Bodoni Moda Light · composition only</span>
      </div>
      <nav class="ecl-switcher" aria-label="Composition variants">
        <button type="button" class="ecl-switcher__btn" data-ecl-variant="a">1 · Overlap</button>
        <button type="button" class="ecl-switcher__btn" data-ecl-variant="b">2 · Bloomberg</button>
        <button type="button" class="ecl-switcher__btn" data-ecl-variant="c">3 · FT Luxury</button>
        <button type="button" class="ecl-switcher__btn" data-ecl-variant="d">4 · Fashion</button>
        <button type="button" class="ecl-switcher__btn" data-ecl-variant="e">5 · Large Scale</button>
        <button type="button" class="ecl-switcher__btn" data-ecl-variant="f">6 · Minimal</button>
        <button type="button" class="ecl-switcher__btn is-active" data-ecl-variant="g">7 · Split</button>
        <button type="button" class="ecl-switcher__btn" data-ecl-variant="h">8 · Signature</button>
      </nav>
      <a class="ecl-chrome__back" href="/">← FORGENIQ</a>
    </header>

    <main class="ecl-stage">
      <div class="ecl-atmosphere" aria-hidden="true">
        <div class="ecl-atmosphere__glow"></div>
        <div class="ecl-atmosphere__grain"></div>
      </div>

      <article class="ecl-hero" aria-label="Editorial composition hero">
        <div class="ecl-masthead">
          <h1 class="ecl-headline">
            <span class="ecl-line ecl-line--split ecl-metallic ecl-metallic--silver">
              <span class="ecl-metallic__base" aria-hidden="true">Investment</span>
              <span class="ecl-metallic__shine">Investment</span>
            </span>
            <span class="ecl-line ecl-line--split ecl-metallic ecl-metallic--silver">
              <span class="ecl-metallic__base" aria-hidden="true">Intelligence</span>
              <span class="ecl-metallic__shine">Intelligence</span>
            </span>
            <span class="ecl-line ecl-line--split ecl-line--italic ecl-line--without">
              <span class="ecl-metallic ecl-metallic--gold ecl-metallic--inline">
                <span class="ecl-metallic__base" aria-hidden="true">Without</span>
                <span class="ecl-metallic__shine">Without</span>
              </span>
              <span class="ecl-the">the</span>
            </span>
            <span class="ecl-line ecl-line--split ecl-line--italic ecl-metallic ecl-metallic--gold">
              <span class="ecl-metallic__base" aria-hidden="true">Noise</span>
              <span class="ecl-metallic__shine">Noise</span>
            </span>
          </h1>
        </div>
      </article>
    </main>

    <footer class="ecl-foot" role="note">
      Composition lab · Bodoni Moda display light · compare identity directions
    </footer>
  </div>

  <script src="/design-lab/editorial-composition-lab/editorial-composition-lab.js" defer></script>
</body>
</html>
