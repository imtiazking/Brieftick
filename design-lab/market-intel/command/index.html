<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>03 · Command Centre</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design-lab/market-intel/_intel-base.css">
  <style>
    .cmd-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 12px;
      min-height: 480px;
    }
    .cmd-core {
      grid-column: 2; grid-row: 2;
      padding: 24px; border-radius: 16px;
      border: 1px solid var(--gold-dim);
      background: radial-gradient(ellipse at center, rgba(212,168,90,0.08), var(--glass));
      display: flex; flex-direction: column; justify-content: center;
    }
    .cmd-core h2 { font-family: var(--display); font-size: 22px; margin-bottom: 12px; }
    .cmd-core p { font-size: 15px; line-height: 1.5; color: #b0b8c8; }
    .cmd-station {
      padding: 16px; border-radius: 12px; border: 1px solid var(--line);
      background: var(--glass); cursor: pointer;
      transition: transform 0.45s var(--ease), border-color 0.3s, flex 0.5s var(--ease);
    }
    .cmd-station:hover { border-color: rgba(255,255,255,0.15); }
    .cmd-station.is-active {
      border-color: var(--gold);
      transform: scale(1.02);
      z-index: 2;
    }
    .cmd-station kbd { font-family: var(--mono); font-size: 8px; color: var(--gold); letter-spacing: 0.1em; }
    .cmd-station h3 { font-size: 14px; margin: 8px 0 6px; }
    .cmd-station p { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .cmd-expand {
      max-height: 0; overflow: hidden;
      transition: max-height 0.5s var(--ease);
      font-size: 13px; color: #a8b0c0; margin-top: 0;
    }
    .cmd-station.is-active .cmd-expand { max-height: 120px; margin-top: 10px; }
    @media (max-width: 720px) {
      .cmd-grid { grid-template-columns: 1fr; }
      .cmd-core { grid-column: 1; grid-row: auto; }
    }
  </style>
</head>
<body>
  <header class="intel-lab"><strong>03 · Command Centre</strong><a href="/design-lab/market-intel">All concepts</a></header>
  <section class="intel-hero" id="hero"></section>
  <main class="intel-main">
    <div class="cmd-grid" id="grid"></div>
  </main>
  <p class="intel-note">Stations expand in place — mission control, not a news grid</p>
  <script type="module">
    import { SESSION, DRIVERS, mountHero } from "/design-lab/market-intel/_intel-mock.js";
    mountHero("hero", "Command Centre");
    const stations = [
      { pos: "1/1", kbd: "STN-01", title: "Tech channel", body: "AI capex narrative live", expand: "NVDA +1.98% · AMD +1.12% · Semis lead tape" },
      { pos: "3/1", kbd: "STN-02", title: "Energy channel", body: "Crude steady", expand: "XOM +1.18% · CVX +0.84%" },
      { pos: "1/3", kbd: "STN-03", title: "Rates desk", body: "Cut bets hurt banks", expand: "JPM −0.41% · Financials lag" },
      { pos: "3/3", kbd: "STN-04", title: "Watch desk", body: SESSION.watch[0], expand: SESSION.watch.slice(1).join(" · ") },
    ];
    const grid = document.getElementById("grid");
    const positions = ["1/1","3/1","1/3","3/3"];
    stations.forEach((s, i) => {
      const el = document.createElement("div");
      el.className = "cmd-station" + (i === 0 ? " is-active" : "");
      el.style.gridColumn = positions[i].split("/")[0];
      el.style.gridRow = positions[i].split("/")[1];
      el.innerHTML = `<kbd>${s.kbd}</kbd><h3>${s.title}</h3><p>${s.body}</p><div class="cmd-expand">${s.expand}</div>`;
      el.addEventListener("click", () => {
        grid.querySelectorAll(".cmd-station").forEach(x => x.classList.remove("is-active"));
        el.classList.add("is-active");
      });
      grid.appendChild(el);
    });
    const core = document.createElement("div");
    core.className = "cmd-core";
    core.innerHTML = `<h2>Session status</h2><p>${SESSION.summary}</p>`;
    grid.appendChild(core);
  </script>
</body>
</html>
