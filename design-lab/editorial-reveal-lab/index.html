<!DOCTYPE html>
<html lang="en" data-erl-variant="i">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Concept 37 — Editorial Reveal Lab · Design Lab · FORGENIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design-lab/editorial-reveal-lab/editorial-reveal-lab.css">
</head>
<body>
  <div class="erl-shell">
    <header class="erl-chrome">
      <div class="erl-chrome__start">
        <strong>Design Lab · Concept 37 — Editorial Reveal Lab</strong>
        <span class="erl-chrome__note">Production Minimal typography · reveal only</span>
      </div>
      <nav class="erl-switcher" aria-label="Reveal animation variants">
        <button type="button" class="erl-switcher__btn is-active" data-erl-variant="i" title="Market Noise Dissolves">I</button>
        <button type="button" class="erl-switcher__btn" data-erl-variant="j" title="Connected Signals">J</button>
        <button type="button" class="erl-switcher__btn" data-erl-variant="k" title="Editorial Curtain">K</button>
        <button type="button" class="erl-switcher__btn" data-erl-variant="l" title="Morning Brief">L</button>
        <button type="button" class="erl-switcher__btn" data-erl-variant="m" title="Intelligence Loading">M</button>
        <button type="button" class="erl-switcher__btn" data-erl-variant="n" title="Market Pulse">N</button>
        <button type="button" class="erl-switcher__btn" data-erl-variant="o" title="Gold Accent Reveal">O</button>
        <button type="button" class="erl-switcher__btn" data-erl-variant="p" title="Institutional Reveal">P</button>
      </nav>
      <div class="erl-chrome__end">
        <button type="button" class="erl-winner" id="erlWinner" aria-pressed="false">Winner</button>
        <span class="erl-winner-note" id="erlWinnerNote" hidden></span>
        <a class="erl-chrome__back" href="/">← FORGENIQ</a>
      </div>
    </header>

    <main class="erl-stage">
      <div class="erl-env" aria-hidden="true">
        <div class="erl-env__fog"></div>
        <div class="erl-env__grid"></div>
        <div class="erl-env__glow"></div>
        <div class="erl-env__vignette"></div>
        <div class="erl-env__grain"></div>
      </div>

      <article class="erl-hero" aria-label="Editorial reveal hero">
        <div class="erl-masthead">
          <div class="erl-reveal-stage">
            <h1 class="erl-headline">
              <span class="erl-line erl-line--split erl-metallic erl-metallic--silver" data-erl-line="1">
                <span class="erl-line__curtain">
                  <span class="erl-metallic__base" aria-hidden="true">Investment</span>
                  <span class="erl-metallic__shine">Investment</span>
                </span>
              </span>
              <span class="erl-line erl-line--split erl-metallic erl-metallic--silver" data-erl-line="2">
                <span class="erl-line__curtain">
                  <span class="erl-metallic__base" aria-hidden="true">Intelligence</span>
                  <span class="erl-metallic__shine">Intelligence</span>
                </span>
              </span>
              <span class="erl-line erl-line--split erl-line--italic erl-line--without" data-erl-line="3">
                <span class="erl-line__curtain erl-line__curtain--flex">
                  <span class="erl-metallic erl-metallic--gold erl-metallic--inline erl-gold-part">
                    <span class="erl-metallic__base" aria-hidden="true">Without</span>
                    <span class="erl-metallic__shine">Without</span>
                  </span>
                  <span class="erl-the erl-gold-part">the</span>
                </span>
              </span>
              <span class="erl-line erl-line--split erl-line--italic erl-metallic erl-metallic--gold erl-gold-part" data-erl-line="4">
                <span class="erl-line__curtain">
                  <span class="erl-metallic__base" aria-hidden="true">Noise</span>
                  <span class="erl-metallic__shine">Noise</span>
                </span>
              </span>
            </h1>

            <div class="erl-fx erl-fx--haze" aria-hidden="true"></div>

            <svg class="erl-fx erl-fx--signals" viewBox="0 0 720 280" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
              <g class="erl-signals-group">
                <line class="erl-sig-line" x1="118" y1="62" x2="318" y2="58" />
                <line class="erl-sig-line" x1="318" y1="58" x2="520" y2="64" />
                <line class="erl-sig-line" x1="248" y1="128" x2="388" y2="132" />
                <line class="erl-sig-line" x1="388" y1="132" x2="520" y2="196" />
                <circle class="erl-sig-dot" cx="118" cy="62" r="2.5" />
                <circle class="erl-sig-dot" cx="318" cy="58" r="2" />
                <circle class="erl-sig-dot" cx="520" cy="64" r="2" />
                <circle class="erl-sig-dot" cx="248" cy="128" r="2" />
                <circle class="erl-sig-dot" cx="388" cy="132" r="2" />
                <circle class="erl-sig-dot" cx="520" cy="196" r="2.5" />
              </g>
            </svg>

            <div class="erl-fx erl-fx--scan" aria-hidden="true"></div>
            <div class="erl-fx erl-fx--pulse" aria-hidden="true"></div>
          </div>
        </div>
      </article>
    </main>

    <footer class="erl-foot" role="note">
      Reveal lab · production Editorial Minimal locked · compare I–P only
    </footer>
  </div>

  <script src="/design-lab/editorial-reveal-lab/editorial-reveal-lab.js" defer></script>
</body>
</html>
