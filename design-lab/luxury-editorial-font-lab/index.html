<!DOCTYPE html>
<html lang="en" data-lefl-font="bodoni-moda">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Concept 34 — Luxury Editorial Font Lab · Design Lab · FORGENIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0,1&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=GFS+Didot&family=Libre+Bodoni:ital,wght@0,400;0,500;1,400&family=Oranienbaum&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Prata&family=Vidaloka&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design-lab/luxury-editorial-font-lab/luxury-editorial-font-lab.css">
</head>
<body>
  <div class="lefl-shell">
    <header class="lefl-chrome">
      <div class="lefl-chrome__start">
        <strong>Design Lab · Concept 34 — Luxury Editorial Font Lab</strong>
        <span class="lefl-chrome__note">Free fonts only · composition locked</span>
      </div>
      <nav class="lefl-switcher" aria-label="Font variants">
        <button type="button" class="lefl-switcher__btn is-active" data-lefl-font="bodoni-moda">Bodoni Moda</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="prata">Prata</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="cormorant">Cormorant</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="playfair">Playfair</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="dm-serif">DM Serif</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="oranienbaum">Oranienbaum</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="libre-bodoni">Libre Bodoni</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="vidaloka">Vidaloka</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="gfs-didot">GFS Didot</button>
        <button type="button" class="lefl-switcher__btn" data-lefl-font="eb-garamond">EB Garamond</button>
      </nav>
      <a class="lefl-chrome__back" href="/">← FORGENIQ</a>
    </header>

    <main class="lefl-stage">
      <div class="lefl-atmosphere" aria-hidden="true">
        <div class="lefl-atmosphere__glow"></div>
        <div class="lefl-atmosphere__grain"></div>
      </div>

      <article class="lefl-hero" aria-label="Luxury editorial hero">
        <div class="lefl-masthead">
          <h1 class="lefl-headline">
            <span class="lefl-line lefl-line--split lefl-metallic lefl-metallic--silver">
              <span class="lefl-metallic__base" aria-hidden="true">Investment</span>
              <span class="lefl-metallic__shine">Investment</span>
            </span>
            <span class="lefl-line lefl-line--split lefl-metallic lefl-metallic--silver">
              <span class="lefl-metallic__base" aria-hidden="true">Intelligence</span>
              <span class="lefl-metallic__shine">Intelligence</span>
            </span>
            <span class="lefl-line lefl-line--split lefl-line--italic lefl-line--without">
              <span class="lefl-metallic lefl-metallic--gold lefl-metallic--inline">
                <span class="lefl-metallic__base" aria-hidden="true">Without</span>
                <span class="lefl-metallic__shine">Without</span>
              </span>
              <span class="lefl-the">the</span>
            </span>
            <span class="lefl-line lefl-line--split lefl-line--italic lefl-metallic lefl-metallic--gold">
              <span class="lefl-metallic__base" aria-hidden="true">Noise</span>
              <span class="lefl-metallic__shine">Noise</span>
            </span>
          </h1>
        </div>
      </article>
    </main>

    <footer class="lefl-foot" role="note">
      Font comparison lab · Concept C layout locked · switch fonts to compare against reference
    </footer>
  </div>

  <script src="/design-lab/luxury-editorial-font-lab/luxury-editorial-font-lab.js" defer></script>
</body>
</html>
