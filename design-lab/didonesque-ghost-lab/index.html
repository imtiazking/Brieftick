<!DOCTYPE html>
<html lang="en" data-dgl-variant="a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Concept 31 — Didonesque Ghost Lab · Design Lab · FORGENIQ</title>
  <link rel="stylesheet" href="/design-lab/didonesque-ghost-lab/didonesque-ghost-lab.css">
</head>
<body>
  <div class="dgl-shell">
    <header class="dgl-chrome">
      <div class="dgl-chrome__start">
        <strong>Design Lab · Concept 31 — Didonesque Ghost Lab</strong>
        <span class="dgl-chrome__note">Didonesque Ghost Light · editorial treatments</span>
      </div>
      <nav class="dgl-switcher" aria-label="Editorial treatment variants">
        <button type="button" class="dgl-switcher__btn is-active" data-dgl-variant="a">A · Classic</button>
        <button type="button" class="dgl-switcher__btn" data-dgl-variant="b">B · Rich Gold</button>
        <button type="button" class="dgl-switcher__btn" data-dgl-variant="c">C · Chrome</button>
        <button type="button" class="dgl-switcher__btn" data-dgl-variant="d">D · Bloomberg</button>
        <button type="button" class="dgl-switcher__btn" data-dgl-variant="e">E · Annual</button>
        <button type="button" class="dgl-switcher__btn" data-dgl-variant="f">F · Fashion</button>
        <button type="button" class="dgl-switcher__btn" data-dgl-variant="g">G · Minimal</button>
        <button type="button" class="dgl-switcher__btn" data-dgl-variant="h">H · Signature</button>
      </nav>
      <a class="dgl-chrome__back" href="/">← FORGENIQ</a>
    </header>

    <main class="dgl-stage">
      <div class="dgl-atmosphere" aria-hidden="true">
        <div class="dgl-atmosphere__glow"></div>
        <div class="dgl-atmosphere__grain"></div>
      </div>

      <article class="dgl-hero" aria-label="Didonesque Ghost editorial hero">
        <div class="dgl-masthead">
          <h1 class="dgl-headline">
            <span class="dgl-line dgl-line--split dgl-metallic dgl-metallic--silver">
              <span class="dgl-metallic__base" aria-hidden="true">Investment</span>
              <span class="dgl-metallic__shine">Investment</span>
            </span>
            <span class="dgl-line dgl-line--split dgl-metallic dgl-metallic--silver">
              <span class="dgl-metallic__base" aria-hidden="true">Intelligence</span>
              <span class="dgl-metallic__shine">Intelligence</span>
            </span>
            <span class="dgl-line dgl-line--split dgl-line--italic dgl-line--without">
              <span class="dgl-metallic dgl-metallic--gold dgl-metallic--inline">
                <span class="dgl-metallic__base" aria-hidden="true">Without</span>
                <span class="dgl-metallic__shine">Without</span>
              </span>
              <span class="dgl-the">the</span>
            </span>
            <span class="dgl-line dgl-line--split dgl-line--italic dgl-metallic dgl-metallic--gold">
              <span class="dgl-metallic__base" aria-hidden="true">Noise</span>
              <span class="dgl-metallic__shine">Noise</span>
            </span>
          </h1>
        </div>
      </article>
    </main>

    <footer class="dgl-foot" role="note">
      Didonesque Ghost Light · add licensed webfonts to design-lab/didonesque-ghost-lab/fonts/ if not installed locally
    </footer>
  </div>

  <script src="/design-lab/didonesque-ghost-lab/didonesque-ghost-lab.js" defer></script>
</body>
</html>
