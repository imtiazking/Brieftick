<!DOCTYPE html>
<html lang="en" data-eel-variant="a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Concept 36 — Editorial Entrance Lab · Design Lab · FORGENIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design-lab/editorial-entrance-lab/editorial-entrance-lab.css">
</head>
<body>
  <div class="eel-shell">
    <header class="eel-chrome">
      <div class="eel-chrome__start">
        <strong>Design Lab · Concept 36 — Editorial Entrance Lab</strong>
        <span class="eel-chrome__note">Production Minimal typography · entrance only</span>
      </div>
      <nav class="eel-switcher" aria-label="Entrance animation variants">
        <button type="button" class="eel-switcher__btn is-active" data-eel-variant="a" title="Editorial Fade">A</button>
        <button type="button" class="eel-switcher__btn" data-eel-variant="b" title="Line By Line">B</button>
        <button type="button" class="eel-switcher__btn" data-eel-variant="c" title="From The Mist">C</button>
        <button type="button" class="eel-switcher__btn" data-eel-variant="d" title="Silver Then Gold">D</button>
        <button type="button" class="eel-switcher__btn" data-eel-variant="e" title="Letter Breathing">E</button>
        <button type="button" class="eel-switcher__btn" data-eel-variant="f" title="Cinematic Drift">F</button>
        <button type="button" class="eel-switcher__btn" data-eel-variant="g" title="Spotlight Reveal">G</button>
        <button type="button" class="eel-switcher__btn" data-eel-variant="h" title="Editorial Wipe">H</button>
      </nav>
      <div class="eel-chrome__end">
        <button type="button" class="eel-winner" id="eelWinner" aria-pressed="false">Winner</button>
        <span class="eel-winner-note" id="eelWinnerNote" hidden></span>
        <a class="eel-chrome__back" href="/">← FORGENIQ</a>
      </div>
    </header>

    <main class="eel-stage">
      <div class="eel-env" aria-hidden="true">
        <div class="eel-env__fog"></div>
        <div class="eel-env__grid"></div>
        <div class="eel-env__glow"></div>
        <div class="eel-env__vignette"></div>
        <div class="eel-env__grain"></div>
      </div>

      <article class="eel-hero" aria-label="Editorial entrance hero">
        <div class="eel-masthead">
          <h1 class="eel-headline">
            <span class="eel-line eel-line--split eel-metallic eel-metallic--silver" data-eel-line="1" data-eel-drift="left">
              <span class="eel-metallic__base" aria-hidden="true">Investment</span>
              <span class="eel-metallic__shine">Investment</span>
            </span>
            <span class="eel-line eel-line--split eel-metallic eel-metallic--silver" data-eel-line="2" data-eel-drift="right">
              <span class="eel-metallic__base" aria-hidden="true">Intelligence</span>
              <span class="eel-metallic__shine">Intelligence</span>
            </span>
            <span class="eel-line eel-line--split eel-line--italic eel-line--without" data-eel-line="3">
              <span class="eel-metallic eel-metallic--gold eel-metallic--inline eel-gold-part" data-eel-drift="left">
                <span class="eel-metallic__base" aria-hidden="true">Without</span>
                <span class="eel-metallic__shine">Without</span>
              </span>
              <span class="eel-the eel-gold-part" data-eel-drift="right">the</span>
            </span>
            <span class="eel-line eel-line--split eel-line--italic eel-metallic eel-metallic--gold eel-gold-part" data-eel-line="4" data-eel-drift="center">
              <span class="eel-metallic__base" aria-hidden="true">Noise</span>
              <span class="eel-metallic__shine">Noise</span>
            </span>
          </h1>
        </div>
      </article>
    </main>

    <footer class="eel-foot" role="note">
      Entrance lab · production Editorial Minimal locked · compare A–H only
    </footer>
  </div>

  <script src="/design-lab/editorial-entrance-lab/editorial-entrance-lab.js" defer></script>
</body>
</html>
