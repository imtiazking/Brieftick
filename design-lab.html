<!DOCTYPE html>
<html lang="en" data-concept="04">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Design Lab · Brieftick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d4a85a; --gold-soft: rgba(212,168,90,.45);
      --violet: #9b7ed9; --violet-glow: rgba(155,126,217,.35);
      --ether: #c4b5e8; --void: #020204;
      --display: "Playfair Display", serif; --body: "Inter Tight", sans-serif; --mono: "JetBrains Mono", monospace;
      --ease: cubic-bezier(0.22, 1, 0.36, 1); --ease-slow: cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--body); background: var(--void); color: #e8ecf5; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .dl-top { position: sticky; top: 0; z-index: 400; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,.05); background: rgba(2,2,4,.92); backdrop-filter: blur(20px); }
    html[data-concept="10"] { --split-mark-top: 88px; }
    html[data-concept="12"] { --ether-mark-top: 88px; }
    .dl-brand strong { font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); }
    .dl-brand span { font-size: 10px; color: #5a6070; display: block; margin-top: 2px; }
    .dl-nav { flex: 1; overflow-x: auto; scrollbar-width: none; }
    .dl-nav::-webkit-scrollbar { display: none; }
    .dl-nav-inner { display: flex; gap: 4px; min-width: max-content; }
    .dl-btn { padding: 5px 10px; border: 1px solid rgba(255,255,255,.08); border-radius: 5px; background: transparent;
      color: #6b7280; font-family: var(--mono); font-size: 7px; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap; transition: all .25s var(--ease); }
    .dl-btn:hover { color: #e8ecf5; border-color: rgba(255,255,255,.18); }
    .dl-btn.is-active { background: var(--gold); color: #0a0a0c; border-color: var(--gold); }
    .dl-btn--sig { border-color: rgba(212,168,90,.4); }
    .dl-btn--evo { border-style: dashed; border-color: rgba(155,126,217,.35); }
    .dl-btn--land { border-color: rgba(100,160,220,.35); }
    .dl-btn--land2 { border-color: rgba(212,168,90,.45); background: rgba(212,168,90,.06); }
    .dl-btn--neo { border-color: rgba(140,200,180,.35); border-style: dotted; }
    .dl-mode { display: flex; gap: 4px; padding: 2px; background: rgba(255,255,255,.04); border-radius: 6px; }
    .dl-mode button { padding: 5px 12px; border: none; border-radius: 4px; background: transparent; color: #6b7280;
      font-family: var(--mono); font-size: 7px; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; transition: all .25s; }
    .dl-mode button.is-active { background: rgba(212,168,90,.2); color: var(--gold); }
    .dl-nav-landing { display: none; }
    body[data-lab="landing"] .dl-nav-identity { display: none; }
    body[data-lab="landing"] .dl-nav-landing { display: block; }
    .dl-back { font-family: var(--mono); font-size: 8px; color: #5a6070; text-decoration: none; letter-spacing: .1em; text-transform: uppercase; }
    .dl-back:hover { color: var(--gold); }
    .dl-top-links { display: flex; gap: 12px; align-items: center; margin-left: auto; }
    .dl-canvas--landing { min-height: 100vh; max-height: none; overflow: visible; border-radius: 0; margin: 0 -18px; width: calc(100% + 36px); }
    .dl-panel[data-lab-group="landing"] .dl-meta { display: none; }

    .dl-stage { max-width: 1680px; margin: 0 auto; padding: 24px 18px 64px; }
    .dl-panel { display: none; animation: rise .6s var(--ease-slow); }
    .dl-panel.is-active { display: block; }
    .dl-panel:not(.is-active) { display: none !important; }
    .dl-panel:not(.is-active) { content-visibility: hidden; contain: strict; pointer-events: none; }
    .dl-panel:not(.is-active) * { animation-play-state: paused !important; }
    .dl-fallback { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 32px; text-align: center; background: radial-gradient(ellipse at 50% 40%, rgba(212,168,90,.08), var(--void));
      border: 1px solid rgba(212,168,90,.2); border-radius: 12px; }
    .dl-fallback h2 { font-family: var(--display); font-size: 24px; margin-bottom: 12px; color: #e8ecf5; }
    .dl-fallback p { font-size: 13px; color: #7a8498; max-width: 40ch; line-height: 1.55; }
    .dl-canvas-loading { min-height: 50vh; display: grid; place-items: center; font-family: var(--mono);
      font-size: 9px; letter-spacing: .2em; color: rgba(212,168,90,.5); text-transform: uppercase; }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .dl-meta { margin-bottom: 18px; }
    .dl-meta-tag { font-family: var(--mono); font-size: 7px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; display: block; }
    .dl-meta h1 { font-family: var(--display); font-size: clamp(20px, 2.8vw, 28px); font-weight: 500; letter-spacing: -.02em; margin-bottom: 6px; }
    .dl-meta p { font-size: 12px; line-height: 1.55; color: #7a8498; max-width: 52ch; }
    .dl-traits { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .dl-traits span { font-family: var(--mono); font-size: 7px; padding: 3px 8px; border: 1px solid rgba(255,255,255,.06); border-radius: 3px; color: #5a6070; }
    .dl-canvas { min-height: min(84vh, 800px); position: relative; border-radius: 2px; overflow: hidden; }
    .dl-foot { text-align: center; margin-top: 32px; font-family: var(--mono); font-size: 8px; color: #3d4454; letter-spacing: .1em; }

    @keyframes phFade { 0%,100% { opacity: .25; } 50% { opacity: .85; } }
    @keyframes phSlow { 0%,100% { opacity: .15; transform: scale(1); } 50% { opacity: .5; transform: scale(1.05); } }
    @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(16px,-24px); } }
    @keyframes orbit { to { transform: translate(-50%,-50%) rotate(360deg); } }
    @keyframes orbitRev { to { transform: translate(-50%,-50%) rotate(-360deg); } }
    @keyframes ringBreath { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .35; } 50% { transform: translate(-50%,-50%) scale(1.04); opacity: .7; } }
    @keyframes ringExpand { 0% { transform: translate(-50%,-50%) scale(.6); opacity: .8; } 100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; } }
    @keyframes river { to { transform: translateX(-50%); } }
    @keyframes horizonGlow { 0%,100% { opacity: .4; } 50% { opacity: .9; } }
    @keyframes particle { 0% { transform: translateY(0) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: .6; } 100% { transform: translateY(-120vh) scale(1); opacity: 0; } }
    @keyframes pulseRing { 0% { transform: translate(-50%,-50%) scale(.5); opacity: .6; } 100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; } }
    @keyframes hxSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    @keyframes hxSpinRev { to { transform: translate(-50%,-50%) rotate(-360deg); } }
    @keyframes hxFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes hxPulseCore { 0%,100% { box-shadow: 0 0 60px rgba(212,168,90,.12); } 50% { box-shadow: 0 0 100px rgba(212,168,90,.28); } }
    @keyframes flow { to { stroke-dashoffset: -48; } }
    @keyframes camPan { 0%,100% { transform: scale(1.06) translate(0,0); } 50% { transform: scale(1.14) translate(-1.5%,-1%); } }
    @keyframes fluidMorph { 0%,100% { border-radius: 58% 42% 62% 38%; transform: translate(0,0) rotate(0deg); } 50% { border-radius: 42% 58% 38% 62%; transform: translate(4%,-5%) rotate(12deg); } }
    @keyframes scanDown { 0% { top: -20%; opacity: 0; } 8% { opacity: .6; } 92% { opacity: .6; } 100% { top: 120%; opacity: 0; } }
    @keyframes waveRoll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes tunnelPulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .35; } 50% { transform: translate(-50%,-50%) scale(1.08); opacity: .65; } }
    @keyframes chorusReveal { from { opacity: 0; transform: translateY(20px); filter: blur(8px); } to { opacity: 1; transform: none; filter: none; } }
    @keyframes prismPlane { 0%,100% { transform: rotateY(0deg) rotateX(12deg); } 50% { transform: rotateY(180deg) rotateX(-8deg); } }
    @keyframes stormFlash { 0%,86%,100% { opacity: 0; } 88%,92% { opacity: .55; } 94% { opacity: .15; } }
    @keyframes gridDepth { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }
    @keyframes reactorSync { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .4; } 50% { transform: translate(-50%,-50%) scale(1.2); opacity: .9; } }
    @keyframes oceanRise { 0% { transform: translateY(0) scale(.5); opacity: 0; } 15% { opacity: .7; } 100% { transform: translateY(-120vh) scale(1); opacity: 0; } }
    @keyframes orbCam { 0%,100% { transform: scale(1.08) translate(0,0); } 50% { transform: scale(1.14) translate(-2%,-1.5%); } }

    .dl-canvas--world { min-height: min(96vh, 920px); max-height: none; overflow: hidden; border-radius: 0; }
    .dl-panel[data-panel^="3"] .dl-meta { margin-bottom: 12px; }
    .world { position: relative; width: 100%; height: min(96vh, 920px); min-height: 88vh; overflow: hidden; background: var(--void); }
    .world-stage { position: absolute; inset: -5%; animation: orbCam 36s ease-in-out infinite; transform-origin: center center; z-index: 1; }
    .world-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 45%, transparent 35%, rgba(0,0,0,.55)); pointer-events: none; z-index: 40; }
    .world-ghost { position: absolute; left: 50%; top: 14%; transform: translateX(-50%); z-index: 50; font-family: var(--display);
      font-size: clamp(48px, 12vw, 140px); font-weight: 400; letter-spacing: -.04em; line-height: .9;
      color: rgba(255,255,255,.03); white-space: nowrap; pointer-events: none; user-select: none; animation: phSlow 10s ease-in-out infinite; }
    .world-answer { position: absolute; left: 50%; top: 20%; transform: translateX(-50%); z-index: 55; max-width: 34ch;
      font-family: var(--display); font-size: clamp(13px, 1.8vw, 17px); line-height: 1.6; font-style: italic; text-align: center;
      color: rgba(232,236,245,.35); transition: color 1.2s var(--ease-slow); pointer-events: none; }
    .world:has(.bt-wrap.is-focused) .world-answer, .world:has(.bt-wrap.has-value) .world-answer { color: rgba(232,236,245,.65); }
    .world-cmd { position: absolute; left: 50%; bottom: 7%; transform: translateX(-50%); z-index: 100; width: min(420px, 88%);
      padding: 16px 22px; background: rgba(4,6,10,.75); backdrop-filter: blur(16px); border: 1px solid rgba(212,168,90,.2);
      border-radius: 20px; opacity: .92; transition: opacity .5s var(--ease), transform .5s var(--ease), box-shadow .5s; pointer-events: auto; }
    .world:hover .world-cmd, .world .world-cmd.bt-wrap.is-focused { opacity: 1; transform: translateX(-50%) translateY(-6px);
      box-shadow: 0 24px 80px rgba(0,0,0,.5); border-color: rgba(212,168,90,.25); }
    .world-cmd .bt-tag { font-size: 7px; color: rgba(212,168,90,.55); display: block; margin-bottom: 10px; text-align: center; letter-spacing: .24em; }
    .world-cmd input { width: 100%; border: none; background: transparent; outline: none; text-align: center;
      font-family: var(--display); font-size: clamp(18px, 2.4vw, 24px); color: #f5f0e8; }
    .world-river { position: absolute; left: 0; right: 0; z-index: 70; font-family: var(--mono); font-size: 8px; letter-spacing: .12em;
      color: rgba(212,168,90,.28); padding: 6px 0; overflow: hidden; pointer-events: none; }
    .world-river span { display: flex; gap: 48px; white-space: nowrap; animation: river 32s linear infinite; }
    .world-river--t { top: 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .world-river--b { bottom: 0; border-top: 1px solid rgba(255,255,255,.04); }
    .world-river--b span { animation-direction: reverse; animation-duration: 38s; }

    .bt-drop { position: absolute; left: 0; right: 0; top: calc(100% + 10px); z-index: 90;
      background: rgba(4,4,8,.98); border: 1px solid rgba(255,255,255,.08); border-radius: 12px;
      padding: 6px 0; max-height: 220px; overflow-y: auto; opacity: 0; visibility: hidden;
      transform: translateY(-6px); transition: all .35s var(--ease); box-shadow: 0 40px 100px rgba(0,0,0,.8); }
    .bt-wrap.is-focused .bt-drop { opacity: 1; visibility: visible; transform: none; }
    .bt-sug { display: flex; gap: 10px; padding: 9px 14px; cursor: pointer; font-size: 11px; transition: background .15s; }
    .bt-sug:hover { background: rgba(255,255,255,.04); }
    .bt-sug .sym { font-family: var(--mono); color: var(--gold); min-width: 48px; font-size: 10px; }
    .bt-sug .sub { color: #7a8498; font-size: 10px; }
    .bt-tag { font-family: var(--mono); font-size: 8px; letter-spacing: .24em; text-transform: uppercase; }

    /* ── 04 Cinematic ── */
    .c04 { position: relative; min-height: 84vh;
      background: radial-gradient(ellipse 100% 80% at 50% 0%, rgba(212,168,90,.12), transparent 50%), var(--void); }
    .c04-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,.7)); pointer-events: none; }
    .c04-cmd { position: absolute; left: 50%; top: 12%; transform: translateX(-50%); width: min(560px, 92%); z-index: 30;
      padding: 22px 30px; background: rgba(6,8,12,.45); backdrop-filter: blur(40px);
      border: 1px solid rgba(212,168,90,.25); border-radius: 20px;
      box-shadow: 0 0 100px rgba(212,168,90,.1); transition: top .5s var(--ease-slow), box-shadow .5s; }
    .bt-wrap.is-focused.c04-cmd { top: 8%; box-shadow: 0 0 140px rgba(212,168,90,.2); }
    .c04-cmd .bt-tag { color: var(--gold); text-align: center; display: block; margin-bottom: 16px; }
    .c04-cmd input { width: 100%; border: none; background: transparent; text-align: center; font-family: var(--display);
      font-size: clamp(20px, 2.6vw, 26px); color: #f0f2f8; outline: none; letter-spacing: -.02em; }
    .c04-answer { position: absolute; left: 50%; top: 52%; transform: translate(-50%,-50%); width: min(500px, 88%); padding: 32px 36px; z-index: 10;
      background: rgba(4,6,10,.55); backdrop-filter: blur(32px); border: 1px solid rgba(212,168,90,.12); border-radius: 18px; }
    .c04-answer p { font-family: var(--display); font-size: 17px; line-height: 1.62; color: rgba(240,242,248,.9); }
    .c04-whisper { position: absolute; font-family: var(--mono); font-size: 9px; letter-spacing: .12em; color: rgba(212,168,90,.35);
      animation: drift 12s ease-in-out infinite; }
    .c04-w1 { left: 8%; top: 32%; } .c04-w2 { right: 10%; top: 24%; animation-delay: -4s; }
    .c04-w3 { left: 12%; bottom: 28%; animation-delay: -8s; }
    .c04-atmo { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .c04-atmo::before, .c04-atmo::after { content: ""; position: absolute; border-radius: 50%; filter: blur(90px); animation: drift 22s ease-in-out infinite; }
    .c04-atmo::before { width: 45%; height: 38%; left: -5%; top: 8%; background: rgba(212,168,90,.14); }
    .c04-atmo::after { width: 38%; height: 32%; right: -8%; bottom: 18%; background: rgba(100,140,200,.1); animation-delay: -10s; }
    .c04-river { position: absolute; left: 0; right: 0; z-index: 8; overflow: hidden; font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
      color: rgba(212,168,90,.35); padding: 10px 0; border-color: rgba(255,255,255,.04); pointer-events: none; }
    .c04-river span { display: flex; gap: 48px; white-space: nowrap; animation: river 36s linear infinite; }
    .c04-river--t { top: 0; border-bottom: 1px solid; } .c04-river--b { bottom: 0; border-top: 1px solid; }
    .c04-river--b span { animation-direction: reverse; animation-duration: 42s; }
    .c04-intel { position: absolute; z-index: 6; padding: 10px 14px; font-family: var(--mono); font-size: 8px; letter-spacing: .1em;
      color: rgba(232,236,245,.4); background: rgba(4,6,10,.45); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.06); border-radius: 10px; animation: drift 16s ease-in-out infinite; pointer-events: none; }
    .c04-i1 { left: 6%; top: 18%; } .c04-i2 { right: 7%; top: 52%; animation-delay: -5s; }
    .c04-i3 { left: 10%; bottom: 22%; animation-delay: -11s; }
    .c04-regime { position: absolute; right: 24px; bottom: 72px; z-index: 6; font-family: var(--mono); font-size: 7px;
      letter-spacing: .18em; color: rgba(212,168,90,.35); text-transform: uppercase; }
    .c04-regime strong { display: block; font-size: 11px; color: rgba(212,168,90,.7); margin-top: 4px; letter-spacing: .08em; }

    /* ── 27 Helix · Orbital Market OS ── */
    .c27 { position: relative; min-height: 92vh;
      background: radial-gradient(ellipse at 50% 48%, #100c18 0%, var(--void) 72%); overflow: hidden; }
    .c27-haze { position: absolute; left: 50%; top: 50%; width: min(90vmin, 820px); height: min(90vmin, 820px);
      transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(212,168,90,.07) 0%, transparent 58%);
      filter: blur(40px); animation: phSlow 12s ease-in-out infinite; pointer-events: none; z-index: 2; }
    .c27-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%, transparent 18%, rgba(0,0,0,.75) 100%);
      pointer-events: none; z-index: 15; }
    .c27-particles { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .c27-particles i { position: absolute; width: 1px; height: 1px; background: rgba(212,168,90,.25); border-radius: 50%;
      animation: particle 22s linear infinite; }
    .c27-gravity { position: absolute; left: 50%; top: 50%; width: min(70vmin, 640px); height: min(70vmin, 640px);
      transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(212,168,90,.05) 0%, transparent 62%);
      animation: phSlow 14s ease-in-out infinite; pointer-events: none; }
    .c27-stage { position: absolute; inset: 0; z-index: 5; }
    .c27-track { position: absolute; left: 50%; top: 50%; border-radius: 50%; border: 1px solid rgba(212,168,90,.06);
      transform: translate(-50%,-50%); pointer-events: none; transition: opacity .8s var(--ease-slow), border-color .8s; }
    .c27.has-focus .c27-track { opacity: .2; }
    .c27.has-focus .c27-track.is-near { opacity: .55; border-color: rgba(212,168,90,.14); }
    .c27-orbit { position: absolute; left: 50%; top: 50%; width: 0; height: 0; transform: translate(-50%,-50%);
      animation: hxSpin var(--dur, 180s) linear infinite; }
    .c27-orbit--rev { animation-name: hxSpinRev; }
    .c27.has-focus .c27-orbit { animation-duration: calc(var(--dur, 180s) * 2.2); }
    .c27-slot { position: absolute; left: 0; top: 0; transform: rotate(var(--angle)) translateY(calc(-1 * var(--radius))); transform-origin: 0 0; }
    .c27-tick {
      display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 14px; margin-left: -50%;
      background: rgba(6,5,10,.4); backdrop-filter: blur(14px); border: 1px solid rgba(212,168,90,.1);
      border-radius: 10px; cursor: pointer; font-family: var(--mono);
      transition: transform .5s var(--ease-slow), border-color .5s, box-shadow .5s, background .5s, opacity .6s;
      transform: rotate(calc(-1 * var(--angle))); animation: hxFloat 6s ease-in-out infinite; animation-delay: var(--delay, 0s);
    }
    .c27-tick:hover { border-color: rgba(212,168,90,.3); box-shadow: 0 0 32px rgba(212,168,90,.12);
      transform: rotate(calc(-1 * var(--angle))) scale(1.05); z-index: 20; opacity: 1 !important; }
    .c27-tick.is-active {
      border-color: rgba(212,168,90,.55); background: rgba(212,168,90,.1);
      box-shadow: 0 0 48px rgba(212,168,90,.25); transform: rotate(calc(-1 * var(--angle))) scale(1.18);
      opacity: 1 !important; z-index: 30; animation: none;
    }
    .c27-tick.is-dim { opacity: .12; filter: blur(0.3px); }
    .c27.has-focus .c27-tick.is-spotlight { opacity: .55; }
    .c27-tick .sym { font-size: 10px; font-weight: 500; letter-spacing: .12em; color: rgba(240,236,228,.85); }
    .c27-tick.is-active .sym { font-size: 11px; color: #f5f0e8; }
    .c27-tick .chg { font-size: 8px; letter-spacing: .08em; opacity: .85; }
    .c27-tick .chg.up { color: #6ec9a0; } .c27-tick .chg.dn { color: #c97a86; }
    .c27-pulse-ring { position: absolute; left: 50%; top: 50%; width: min(55vmin, 480px); height: min(55vmin, 480px);
      border: 1px solid rgba(212,168,90,.08); border-radius: 50%; transform: translate(-50%,-50%);
      animation: ringExpand 7s ease-out infinite; pointer-events: none; opacity: .6; }
    .c27-core { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 30; width: min(400px, 92%); pointer-events: none; }
    .c27-core > * { pointer-events: auto; }
    .c27-nucleus {
      padding: 0; border-radius: 24px; overflow: hidden;
      background: rgba(4,3,8,.82); backdrop-filter: blur(36px);
      border: 1px solid rgba(212,168,90,.28);
      box-shadow: 0 0 80px rgba(212,168,90,.12), inset 0 0 60px rgba(212,168,90,.03);
      animation: hxPulseCore 5s ease-in-out infinite;
      transition: transform .6s var(--ease-slow), box-shadow .5s;
    }

    function initCinematicWorld(root, opts) {
      const world = root.querySelector(".cw");
      if (!world || world.dataset.cwInit === "1") return null;
      world.dataset.cwInit = "1";

      const isEther = opts?.ether || world.classList.contains("cw--ether");
      const cam = world.querySelector(".cw-cam");
      const scroller = world.classList.contains("cw--snap") ? world : null;
      const scenes = world.querySelectorAll(".cw-scene");
      const dots = world.querySelectorAll(".cw-progress i");
      let mx = 0, my = 0, raf = 0;
      let alive = true;
      let moveRect = null;
      let lastPointerAt = 0;

      const applyPointer = () => {
        if (!alive || document.hidden) return;
        if (!isEther && cam) cam.style.transform = `translate3d(${mx * 32}px, ${my * 22}px, 0) scale(1.06)`;
        world.style.setProperty("--mx", String(mx));
        world.style.setProperty("--my", String(my));
      };

      const onMove = (e) => {
        if (!alive || document.hidden) return;
        const now = performance.now();
        if (isEther && now - lastPointerAt < 32) return;
        lastPointerAt = now;
        if (!moveRect) moveRect = world.getBoundingClientRect();
        mx = (e.clientX - moveRect.left) / moveRect.width - 0.5;
        my = (e.clientY - moveRect.top) / moveRect.height - 0.5;
        if (!raf) raf = requestAnimationFrame(() => { applyPointer(); raf = 0; });
      };

      const onScroll = () => {
        if (!alive || document.hidden) return;
        const st = scroller ? scroller.scrollTop : window.scrollY;
        const h = (scroller ? scroller.scrollHeight - scroller.clientHeight : 1) || 1;
        const p = Math.min(1, Math.max(0, st / h));
        world.style.setProperty("--scroll", String(p));
        world.classList.toggle("cw--deep", p > 0.25);
      };

      const onResize = () => { moveRect = null; };
      world.addEventListener("mousemove", onMove, { passive: true });
      (scroller || window).addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("resize", onResize, { passive: true });
      onScroll();

      const cmd = world.querySelector(".bt-wrap");
      const onFocusIn = () => world.classList.add("cw--focus");
      const onFocusOut = (e) => {
        if (!cmd.contains(e.relatedTarget)) world.classList.remove("cw--focus");
      };
      if (cmd) {
        cmd.addEventListener("focusin", onFocusIn);
        cmd.addEventListener("focusout", onFocusOut);
      }

      const obs = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (!e.isIntersecting) return;
          e.target.classList.add("is-active");
          const i = [...scenes].indexOf(e.target);
          dots.forEach((d, j) => d.classList.toggle("is-on", j === i));
        });
      }, { root: scroller, threshold: 0.45 });
      scenes.forEach((s) => obs.observe(s));

      const tickHandlers = [];
      world.querySelectorAll("[data-ticker]").forEach((tick) => {
        const onEnter = () => {
          world.querySelectorAll(".tick").forEach((t) => t.classList.remove("is-hot"));
          tick.classList.add("is-hot");
        };
        const onLeave = () => tick.classList.remove("is-hot");
        tick.addEventListener("mouseenter", onEnter);
        tick.addEventListener("mouseleave", onLeave);
        tickHandlers.push({ tick, onEnter, onLeave });
      });

      const onVis = () => {
        document.documentElement.classList.toggle("bt-paused", document.hidden);
      };
      document.addEventListener("visibilitychange", onVis);

      return () => {
        alive = false;
        if (raf) cancelAnimationFrame(raf);
        world.removeEventListener("mousemove", onMove);
        window.removeEventListener("resize", onResize);
        (scroller || window).removeEventListener("scroll", onScroll);
        document.removeEventListener("visibilitychange", onVis);
        if (cmd) {
          cmd.removeEventListener("focusin", onFocusIn);
          cmd.removeEventListener("focusout", onFocusOut);
        }
        obs.disconnect();
        tickHandlers.forEach(({ tick, onEnter, onLeave }) => {
          tick.removeEventListener("mouseenter", onEnter);
          tick.removeEventListener("mouseleave", onLeave);
        });
        world.dataset.cwInit = "";
        world.classList.remove("cw--focus");
      };
    }

    let cmdPhIndex = 0;
    let cmdPhTimer = null;

    function tickCmdPlaceholders() {
      if (document.documentElement.dataset.concept === "16") return;
      const input = document.querySelector(".dl-panel.is-active .bt-wrap input");
      if (input && document.activeElement !== input && !input.value)
        input.placeholder = CMD.placeholders[cmdPhIndex++ % CMD.placeholders.length];
    }

    function syncCmdPlaceholderTimer() {
      const input = document.querySelector(".dl-panel.is-active .bt-wrap input");
      if (!input || document.documentElement.dataset.concept === "16") {
        if (cmdPhTimer) { clearInterval(cmdPhTimer); cmdPhTimer = null; }
        return;
      }
      if (!cmdPhTimer) cmdPhTimer = setInterval(() => {
        if (document.hidden) return;
        tickCmdPlaceholders();
      }, 4000);
    }

    function bindCmd(root) {
      const wrap = root.querySelector(".bt-wrap");
      if (!wrap || wrap.dataset.bound === "1") return;

    function initHelix(root) {
      const container = root.querySelector("#helix-root");
      const ticks = root.querySelectorAll(".c27-tick");
      let activeSym = null;

      function intel(sym) {
        return HELIX_INTEL[sym] || { ...HELIX_INTEL.DEFAULT, related: HELIX_INTEL.DEFAULT.related.filter((s) => s !== sym).slice(0, 3) };
      }

      function selectTicker(btn) {
        const sym = btn.dataset.sym;
        const chg = btn.dataset.chg;
        const ringId = btn.dataset.ring;
        activeSym = sym;
        const data = intel(sym);
        const up = chg.startsWith("+");

        container.classList.add("has-focus");
        ticks.forEach((t) => {
          t.classList.remove("is-active", "is-dim", "is-spotlight");
          if (t === btn) t.classList.add("is-active");
          else t.classList.add("is-dim");
        });
        data.related.forEach((r) => {
          const rel = root.querySelector(`.c27-tick[data-sym="${r}"]`);
          if (rel && rel !== btn) { rel.classList.remove("is-dim"); rel.classList.add("is-spotlight"); }
        });

        root.querySelectorAll(".c27-track, .c27-orbit").forEach((el) => {
          el.classList.toggle("is-near", el.dataset.ring === ringId);
        });

        root.querySelector("#hx-sym").textContent = sym;
        const chgEl = root.querySelector("#hx-chg");
        chgEl.textContent = chg;
        chgEl.className = "c27-focus-chg " + (up ? "up" : "dn");
        root.querySelector("#hx-summary").textContent = data.summary;
        root.querySelector("#hx-cat").textContent = data.catalyst;
        root.querySelector("#hx-sec").textContent = data.sector;
        root.querySelector("#hx-pulse").textContent = data.pulse + "%";
        root.querySelector("#hx-pulse-bar").style.width = data.pulse + "%";
        root.querySelector("#hx-context").textContent =
          data.related.length ? `Also in orbit · ${data.related.join(" · ")}` : "";

        const input = root.querySelector("#helix-input");
        if (input) input.placeholder = `Why is ${sym} moving?`;
      }

      ticks.forEach((btn) => {
        btn.addEventListener("click", (e) => { e.stopPropagation(); selectTicker(btn); });
      });

      const input = root.querySelector("#helix-input");
      input?.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && input.value.trim()) {
          const q = input.value.trim().toUpperCase();
          const match = root.querySelector(`.c27-tick[data-sym="${q}"]`) ||
            [...ticks].find((t) => t.dataset.sym.includes(q));
          if (match) selectTicker(match);
        }
      });

      selectTicker(root.querySelector('.c27-tick[data-sym="NVDA"]') || ticks[0]);
    }

    function initWorldDrift(el, sel) {
      if (reduceMotion()) return;
      const stage = el.querySelector(sel);
      if (!stage || el.dataset.driftBound === "1") return;
      el.dataset.driftBound = "1";
      let raf = 0;
      const onMove = (e) => {
        if (document.hidden || !el.closest(".dl-panel.is-active")) return;
        if (raf) return;
        raf = requestAnimationFrame(() => {
          raf = 0;
          const r = el.getBoundingClientRect();
          if (!r.width) return;
          const x = (e.clientX - r.left) / r.width - 0.5;
          const y = (e.clientY - r.top) / r.height - 0.5;
          stage.style.transform = `scale(1.04) translate(${x * -18}px, ${y * -12}px)`;
        });
      };
      el.addEventListener("mousemove", onMove, { passive: true });
      el._driftTeardown = () => {
        if (raf) cancelAnimationFrame(raf);
        el.removeEventListener("mousemove", onMove);
        el.dataset.driftBound = "";
        el._driftTeardown = null;
      };
    }

      ).join("");
      const telem = Array.from({ length: 8 }, (_, i) =>
        `<span style="--y:${12 + i * 10}%">${M.tickers[i % 4][0]} ${M.tickers[i % 4][2]} · ${M.regime.l} · </span>`
      ).join("");
      el.innerHTML = `<div class="world w40">
        ${worldRivers()}
        <div class="world-stage w40-stage">
          <div class="w40-reactor">${rings}${beams}<div class="w40-core"></div></div>
          <div class="w40-telemetry">${telem}</div>
        </div>
        <div class="world-vignette"></div>${worldAmbient()}${worldCmd("w40-cmd")}
      </div>`;
      finishWorld(el);
      initWorldDrift(el, ".w40-stage");
    }

    function build41(el) {
      el.innerHTML = `<div class="world w41">
        ${worldRivers()}
        <div class="world-stage w41-stage">
          <div class="w41-layer w41-l1"></div><div class="w41-layer w41-l2"></div><div class="w41-layer w41-l3"></div>
          <div class="w41-mote">${worldParticles(14, "w41-mote")}</div>
          <div class="w41-orb w41-o1">${M.regime.l}</div>
          <div class="w41-orb w41-o2">${M.tickers[1][0]} ${M.tickers[1][2]}</div>
          <div class="w41-orb w41-o3">ETHER · LIVE</div>
        </div>
        <div class="world-vignette"></div>${worldAmbient()}${worldCmd("w41-cmd")}
      </div>`;
      finishWorld(el);
      initWorldDrift(el, ".w41-stage");
    }

    function build42(el) {
      const rings = HELIX_RINGS.map((ring) => {
        const rev = ring.rev ? " w42-orbit--rev" : "";
        const slots = ring.tickers.map(([sym, chg], i) => {
          const a = (i / ring.tickers.length) * 360;
          return `<div class="w42-slot" style="--d:${i * 0.5}s;transform:rotate(${a}deg)">
            <span class="w42-tick" data-sym="${sym}" style="--r:${ring.radius}">${sym} ${chg}</span></div>`;
        }).join("");
        return `<div class="w42-orbit${rev}" style="width:${ring.radius};height:${ring.radius};--dur:${ring.dur}s">${slots}</div>`;
      }).join("");
      el.innerHTML = `<div class="world w42">
        ${worldRivers()}
        <div class="world-stage w42-stage">
          <div class="w42-gravity"><div class="w42-well"></div>${rings}</div>
        </div>
        <div class="world-vignette"></div>${worldAmbient()}${worldCmd("w42-cmd")}
      </div>`;
      finishWorld(el);
      initWorldDrift(el, ".w42-stage");
      el.querySelectorAll(".w42-tick").forEach((t) => {
        t.addEventListener("mouseenter", () => {
          el.querySelectorAll(".w42-tick").forEach((x) => x.style.opacity = "0.25");
          t.style.opacity = "1";
        });
        t.addEventListener("mouseleave", () => el.querySelectorAll(".w42-tick").forEach((x) => x.style.opacity = ""));
      });
    }

    const BUILD_IDENTITY = {
      "04": build04, "27": build27, "28": build28, "29": build29, "30": build30, "31": build31, "32": build32, "33": build33, "34": build34,
      "35": build35, "36": build36, "37": build37, "38": build38, "39": build39, "40": build40, "41": build41, "42": build42,
    };
    const BUILD_LANDING = {
      "09": build09, "10": build10, "11": build11, "12": build12,
      "13": build13, "14": build14, "15": build15, "16": build16,
    };
    const WORLD_IDS = ["35", "36", "37", "38", "39", "40", "41", "42"];
    const IDENTITY_IDS = Object.keys(BUILD_IDENTITY);
    const LANDING_IDS = Object.keys(BUILD_LANDING);

    let labMode = "landing";
    let activePanelId = "09";
    const builtPanels = new Set();

    function canvasFallback(id, err) {
      const m = META[id];
      const msg = err ? String(err.message || err) : "";
      return `<div class="dl-fallback">
        <h2>Concept ${id} · ${m ? m.title : "Environment"}</h2>
        <p>${m ? m.desc : "Preview unavailable."}${msg ? ` (${msg})` : ""}</p>
        <p style="margin-top:16px;font-family:var(--mono);font-size:9px;color:rgba(212,168,90,.5)">Ask the market anything — command layer active when environment loads.</p>
      </div>`;
    }

    function ensurePanelBuilt(id) {
      if (builtPanels.has(id)) return;
      const canvas = document.getElementById(`canvas-${id}`);
      if (!canvas) return;
      const build = LANDING_IDS.includes(id) ? BUILD_LANDING[id] : BUILD_IDENTITY[id];
      if (!build) {
        canvas.innerHTML = canvasFallback(id);
        builtPanels.add(id);
        return;
      }
      const isLanding = LANDING_IDS.includes(id);
      canvas.innerHTML = `<div class="dl-canvas-loading">${isLanding ? "Loading landing…" : "Loading environment…"}</div>`;
      requestAnimationFrame(() => {
        try {
          build(canvas);
          if (!isLanding) bindCmd(canvas);
        } catch (err) {
          console.error("[design-lab] build failed:", id, err);
          canvas.innerHTML = canvasFallback(id, err);
        }
        builtPanels.add(id);
      });
    }

    function setActivePanel(id) {
      if (activeCinematicTeardown) {
        activeCinematicTeardown();
        activeCinematicTeardown = null;
      }
      activePanelId = id;
      document.documentElement.dataset.concept = id;
      const group = LANDING_IDS.includes(id) ? "landing" : "identity";
      document.querySelectorAll(".dl-panel").forEach((p) => {
        const inGroup = p.dataset.labGroup === group;
        const active = inGroup && p.dataset.panel === id;
        p.classList.toggle("is-active", active);
        p.style.display = !inGroup ? "none" : active ? "block" : "none";
      });
      document.querySelectorAll(`.dl-nav-${group} .dl-btn`).forEach((b) =>
        b.classList.toggle("is-active", b.dataset.id === id)
      );
      ensurePanelBuilt(id);
      if (id === "10") syncSplitMarkTop();
      if (id === "12") syncEtherMarkTop();
      const canvas = document.getElementById(`canvas-${id}`);
      if (canvas && canvas._cinematicTeardown) activeCinematicTeardown = canvas._cinematicTeardown;
      syncCmdPlaceholderTimer();
    }

    function renderPanels(ids, isLanding, append) {
      const stage = document.getElementById("stage");
      const html = ids.map((id) => {
        const m = META[id];
        const isWorld = WORLD_IDS.includes(id);
        const canvasClass = isLanding ? "dl-canvas dl-canvas--landing" : isWorld ? "dl-canvas dl-canvas--world" : "dl-canvas";
        return `<section class="dl-panel" data-panel="${id}" data-lab-group="${isLanding ? "landing" : "identity"}">
          <div class="dl-meta"><span class="dl-meta-tag">Concept ${id}</span><h1>${m.title}</h1><p>${m.desc}</p>
          <div class="dl-traits">${m.traits.map((t) => `<span>${t}</span>`).join("")}</div></div>
          <div class="${canvasClass}" id="canvas-${id}"></div></section>`;
      }).join("");
      if (append) stage.insertAdjacentHTML("beforeend", html);
      else stage.innerHTML = html;
    }

    function renderAll() {
      builtPanels.clear();
      renderPanels(IDENTITY_IDS, false, false);
      renderPanels(LANDING_IDS, true, true);
      applyLabMode(labMode);
    }

    function applyLabMode(mode) {
      labMode = mode;
      document.body.dataset.lab = mode;
      const defaultId = mode === "landing" ? "10" : "04";
      document.querySelectorAll(".dl-mode button").forEach((b) => b.classList.toggle("is-active", b.dataset.lab === mode));
      document.getElementById("dl-brand-sub").textContent = mode === "landing"
        ? "Landing · 10 Split · chosen direction · 09–16 explore"
        : "Identity · 04, 27–42 · environments only";
      document.getElementById("dl-foot").textContent = mode === "landing"
        ? "Landing exploration · production site unchanged · not live"
        : "World exploration · motion-first · not production";
      setActivePanel(defaultId);
    }

    renderAll();

    document.querySelectorAll(".dl-mode button").forEach((btn) => {
      btn.addEventListener("click", () => applyLabMode(btn.dataset.lab));
    });

    document.querySelectorAll(".dl-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.id;
        const group = LANDING_IDS.includes(id) ? "landing" : "identity";
        if (group !== labMode) applyLabMode(group);
        else setActivePanel(id);
      });
    });
  </script>
</body>
</html>
