<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Standalone logo compare · Variation 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/debug/logo-variation-preview/logo-variation.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 100vh; }
    .panel { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 3rem; min-height: 420px; }
    .panel--dark { background: #0a0c10; }
    .panel--white { background: #ffffff; }
    .panel__label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5; }
    .panel--white .panel__label { color: #333; }
    .lockup-current img { height: 52px; width: auto; display: block; object-fit: contain; }
    .lockup-variation { display: none; }
    .lockup-current { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .lockup-variation { flex-direction: column; align-items: center; gap: 0.75rem; }
    body.capture-current .lockup-variation { display: none !important; }
    body.capture-current .lockup-current { display: flex !important; }
    body.capture-variation .lockup-current { display: none !important; }
    body.capture-variation .lockup-variation { display: flex !important; }
    .side-by-side { display: flex; gap: 3rem; align-items: center; flex-wrap: wrap; justify-content: center; }
    .side-by-side .col { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .side-by-side small { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.45; }
    .panel--white .side-by-side small { color: #666; }
    .panel--white .lockup-current img { filter: invert(1); }
    #panel-dark, #panel-white { width: 100%; }
  </style>
</head>
<body>
  <div class="panels">
    <div class="panel panel--dark" id="panel-dark">
      <span class="panel__label">Dark background</span>
      <div class="side-by-side">
        <div class="col lockup-current">
          <small>Current</small>
          <img src="/brand/forgeniq-logo.png" alt="FORGENIQ" width="4096" height="2048">
        </div>
        <div class="col lockup-variation">
          <small>Variation 1</small>
          <div class="fq-logo-stacked fq-logo-stacked--standalone" role="img" aria-label="FORGENIQ">
            <span class="fq-logo-stacked__symbol">
              <img src="/brand/forgeniq-symbol-white.png" alt="" width="474" height="474">
            </span>
            <span class="fq-logo-stacked__wordmark">
              <img class="fq-logo-stacked__wordmark-svg" src="/debug/logo-variation-preview/forgeniq-wordmark.svg" alt="FORGENIQ" width="10101" height="2048">
            </span>
          </div>
        </div>
      </div>
    </div>
    <div class="panel panel--white" id="panel-white">
      <span class="panel__label">White background</span>
      <div class="side-by-side">
        <div class="col lockup-current">
          <small>Current</small>
          <img src="/brand/forgeniq-logo.png" alt="FORGENIQ" width="4096" height="2048">
        </div>
        <div class="col lockup-variation">
          <small>Variation 1</small>
          <div class="fq-logo-stacked fq-logo-stacked--standalone" role="img" aria-label="FORGENIQ">
            <span class="fq-logo-stacked__symbol">
              <img src="/brand/forgeniq-symbol-white.png" alt="" width="474" height="474">
            </span>
            <span class="fq-logo-stacked__wordmark">
              <img class="fq-logo-stacked__wordmark-svg" src="/debug/logo-variation-preview/forgeniq-wordmark.svg" alt="FORGENIQ" width="10101" height="2048">
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
