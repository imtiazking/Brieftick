<!DOCTYPE html>
<html lang="en" data-theme="split">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Brieftick · Dashboard Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/split-brand.css">
  <link rel="stylesheet" href="/styles/split-theme.css">
  <link rel="stylesheet" href="/styles/dashboard-design-lab.css">
  <link rel="stylesheet" href="/styles/dashboard-rail-modules.css">
  <link rel="stylesheet" href="/styles/dashboard-movers-intel.css">
  <link rel="stylesheet" href="/styles/dashboard-news-narrative.css">
  <link rel="stylesheet" href="/styles/dashboard-intel-charts.css">
  <link rel="stylesheet" href="/styles/dashboard-preview.css">
  <link rel="stylesheet" href="/styles/dashboard-briefing-story.css">
  <link rel="stylesheet" href="/styles/dashboard-watchlist-intel.css">
  <link rel="stylesheet" href="/styles/dashboard-connected-markets.css">
  <link rel="stylesheet" href="/styles/ticker-deep-dive.css">
  <script>
    window.__DASHBOARD_PREVIEW = true;
    window.__DASHBOARD_DESIGN_LAB = true;
    window.Clerk = undefined;
    window._clerkUser = null;
  </script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.0",
      "three-conic-polygon-geometry": "https://esm.sh/three-conic-polygon-geometry@2.1.1?external=three",
      "three-geojson-geometry": "https://esm.sh/three-geojson-geometry@2.1.1?external=three"
    }
  }
  </script>
  <script type="module" src="/lib/moversSymbolLookup.bridge.js"></script>
  <script type="module" src="/preview/dashboard-preview-page.js"></script>
</head>
<body class="dash-preview-body dash-lab-body">
  <div class="split-atmosphere" aria-hidden="true">
    <div class="split-atmosphere__dual"><span></span><span></span></div>
    <div class="split-atmosphere__fog"></div>
    <div class="split-atmosphere__vignette"></div>
  </div>

  <header class="dash-preview-chrome" aria-label="Dashboard preview">
    <div class="dash-preview-chrome__brand">
      <div class="brand split-brand">
        <img src="/logo-transparent.png" alt="Brieftick" class="split-brand-img" width="120" height="40">
      </div>
      <span class="dash-preview-chrome__meta">Dashboard preview · Intelligence Wheel</span>
    </div>
    <nav class="dash-preview-chrome__links" aria-label="Preview links">
      <a href="/dashboard-design-lab?concept=wheel">Design Lab</a>
      <a href="/">Home</a>
    </nav>
  </header>

  <main class="dash-preview-main">
    <div class="dash-preview-wheel-wrap">
      <section id="panelWheel" class="dash-lab-panel is-active" aria-label="Intelligence Wheel">
        <div class="dash-lab-env" aria-hidden="true">
          <div class="dash-lab-env__haze"></div>
          <div class="dash-lab-env__vignette"></div>
        </div>
        <div class="intel-wheel-scene">
          <header class="wheel-pulse-strip" id="wheelPulseStrip" aria-label="Market Pulse"></header>
          <p class="intel-wheel__hint">Drag or click any channel · arrow keys</p>
          <div class="intel-wheel__viewport" id="wheelViewport" tabindex="0" aria-label="Intelligence wheel"></div>
          <div class="wheel-module-viewport">
            <div class="rail-module-stage" id="wheelModuleStage" role="region" aria-live="polite"></div>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
